<!DOCTYPE html>
<html>
<head>
<title>UCER Student Login</title>

<style>
body{
    font-family: Arial;
    background:#f2f2f2;
}

.login-box{
    width:300px;
    margin:120px auto;
    padding:20px;
    background:white;
    border-radius:8px;
    box-shadow:0 0 10px gray;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>UCER Student Login</h2>

<form>
<input type="text" placeholder="Student ID" required>
<br>

<input type="password" placeholder="Password" required>
<br>

<button type="submit">Login</button>
</form>

</div>

</body>
</html>
